<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --line: #d8dde6;
        --line-strong: #aab4c3;
        --text: #1f2937;
        --muted: #667085;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }

      .app {
        width: min(1500px, calc(100vw - 32px));
        margin: 24px auto;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
      }

      select,
      input[type='text'] {
        height: 36px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        padding: 0 10px;
        min-width: 190px;
      }

      input[type='text'] {
        min-width: 300px;
      }

      .checks {
        display: flex;
        gap: 14px;
        align-items: center;
        min-height: 36px;
      }

      .check {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--text);
        font-weight: 600;
        white-space: nowrap;
      }

      .check input,
      tbody input {
        width: 16px;
        height: 16px;
      }

      button {
        height: 36px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      .message {
        min-height: 22px;
        margin: 8px 0;
        color: var(--muted);
      }

      .message.error {
        color: var(--danger);
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        max-height: calc(100vh - 210px);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1050px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 10px;
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #eef2f7;
        color: #344054;
        font-size: 12px;
        font-weight: 800;
      }

      th.sortable {
        cursor: pointer;
        user-select: none;
      }

      .name-button {
        height: auto;
        border: 0;
        background: transparent;
        color: var(--accent);
        padding: 0;
        font: inherit;
        font-weight: 700;
        text-align: left;
        text-decoration: underline;
        cursor: pointer;
      }

      th.select-col,
      td.select-col {
        width: 44px;
        text-align: center;
      }

      tbody tr:hover {
        background: #f5f8ff;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
      }

      .count {
        margin-left: auto;
        color: var(--muted);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.38);
        padding: 18px;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: min(720px, 100%);
        max-height: min(760px, calc(100vh - 36px));
        overflow: auto;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.25);
      }

      .modal-head,
      .modal-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .modal-actions {
        justify-content: flex-end;
        border-top: 1px solid var(--line);
        border-bottom: 0;
      }

      .modal-title {
        margin: 0;
        font-size: 18px;
        flex: 1;
      }

      .modal-body {
        padding: 18px;
      }

      .detail-grid,
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 16px;
      }

      .detail-item {
        border-bottom: 1px solid var(--line);
        padding-bottom: 8px;
      }

      .detail-label {
        color: var(--muted);
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .detail-value {
        min-height: 18px;
      }

      .form-field {
        display: grid;
        gap: 5px;
      }

      .form-field input[type='text'] {
        width: 100%;
        min-width: 0;
      }

      .export-option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
      }

      @media (max-width: 720px) {
        .app {
          width: calc(100vw - 20px);
          margin: 14px auto;
        }

        input[type='text'],
        select {
          min-width: 100%;
        }

        .field {
          width: 100%;
        }

        .actions {
          flex-wrap: wrap;
        }

        .count {
          width: 100%;
          margin-left: 0;
        }

        .detail-grid,
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Dades de professors</h1>

      <section class="toolbar" aria-label="Filtres">
        <div class="field">
          <label for="deptFilter">DEPT.</label>
          <select id="deptFilter">
            <option value="">Tots</option>
          </select>
        </div>

        <div class="field">
          <label for="nameFilter">NOM SENCER</label>
          <input id="nameFilter" type="text" autocomplete="off">
        </div>

        <button id="resetButton" type="button">RESET</button>

        <div class="checks" aria-label="Estat">
          <label class="check">
            <input id="baixaFilter" type="checkbox">
            BAIXA?
          </label>
          <label class="check">
            <input id="noActiusFilter" type="checkbox">
            NO ACTIUS
          </label>
        </div>
      </section>

      <div id="message" class="message">Carregant dades...</div>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="select-col">
                <input id="selectVisibleRows" type="checkbox" aria-label="Seleccionar files filtrades">
              </th>
              <th class="sortable" data-sort="esp">ESP</th>
              <th class="sortable" data-sort="dept">DEPT.</th>
              <th class="sortable" data-sort="fullName">NOM SENCER</th>
              <th class="sortable" data-sort="situacio">SITUACIO</th>
              <th class="sortable" data-sort="dni">DNI</th>
              <th class="sortable" data-sort="telf">TELF</th>
              <th class="sortable" data-sort="correu">CORREU</th>
              <th class="sortable" data-sort="xtec">XTEC</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>

      <section class="actions">
        <button id="baixaButton" class="primary" type="button">Donar de baixa</button>
        <button id="actiuButton" class="primary" type="button">Desactivar</button>
        <button id="exportButton" type="button">Exportar</button>
        <span id="count" class="count"></span>
      </section>
    </main>

    <div id="teacherModalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="teacherModalTitle">
      <section class="modal">
        <header class="modal-head">
          <h2 id="teacherModalTitle" class="modal-title">Professor</h2>
          <button id="closeTeacherModalButton" type="button">Tancar</button>
        </header>
        <div id="teacherModalBody" class="modal-body"></div>
        <footer id="teacherModalActions" class="modal-actions"></footer>
      </section>
    </div>

    <div id="exportModalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
      <section class="modal">
        <header class="modal-head">
          <h2 id="exportModalTitle" class="modal-title">Exportar</h2>
          <button id="closeExportModalButton" type="button">Tancar</button>
        </header>
        <div class="modal-body">
          <label class="export-option">
            <input type="radio" name="exportFormat" value="csv" checked>
            Full de càlcul
          </label>
          <div id="exportResult" class="message"></div>
        </div>
        <footer class="modal-actions">
          <button id="cancelExportButton" type="button">Cancel·lar</button>
          <button id="confirmExportButton" class="primary" type="button">Exportar</button>
        </footer>
      </section>
    </div>

    <script>
      const state = {
        rows: [],
        departments: [],
        visibleRows: [],
        selectedRows: new Set(),
        sortKey: '',
        sortDirection: 'asc',
        loading: false,
      };

      const elements = {
        deptFilter: document.getElementById('deptFilter'),
        nameFilter: document.getElementById('nameFilter'),
        baixaFilter: document.getElementById('baixaFilter'),
        noActiusFilter: document.getElementById('noActiusFilter'),
        selectVisibleRows: document.getElementById('selectVisibleRows'),
        resetButton: document.getElementById('resetButton'),
        baixaButton: document.getElementById('baixaButton'),
        actiuButton: document.getElementById('actiuButton'),
        exportButton: document.getElementById('exportButton'),
        tableBody: document.getElementById('tableBody'),
        message: document.getElementById('message'),
        count: document.getElementById('count'),
        sortableHeaders: document.querySelectorAll('th.sortable'),
        teacherModalBackdrop: document.getElementById('teacherModalBackdrop'),
        teacherModalTitle: document.getElementById('teacherModalTitle'),
        teacherModalBody: document.getElementById('teacherModalBody'),
        teacherModalActions: document.getElementById('teacherModalActions'),
        closeTeacherModalButton: document.getElementById('closeTeacherModalButton'),
        exportModalBackdrop: document.getElementById('exportModalBackdrop'),
        exportResult: document.getElementById('exportResult'),
        closeExportModalButton: document.getElementById('closeExportModalButton'),
        cancelExportButton: document.getElementById('cancelExportButton'),
        confirmExportButton: document.getElementById('confirmExportButton'),
      };

      elements.deptFilter.addEventListener('change', render);
      elements.nameFilter.addEventListener('input', render);
      elements.baixaFilter.addEventListener('change', () => {
        updateButtonLabels();
        render();
      });
      elements.noActiusFilter.addEventListener('change', () => {
        updateButtonLabels();
        render();
      });
      elements.resetButton.addEventListener('click', resetFilters);
      elements.baixaButton.addEventListener('click', updateBaixa);
      elements.actiuButton.addEventListener('click', updateActiu);
      elements.exportButton.addEventListener('click', openExportModal);
      elements.selectVisibleRows.addEventListener('change', toggleVisibleSelection);
      elements.closeTeacherModalButton.addEventListener('click', closeTeacherModal);
      elements.closeExportModalButton.addEventListener('click', closeExportModal);
      elements.cancelExportButton.addEventListener('click', closeExportModal);
      elements.confirmExportButton.addEventListener('click', exportSelectedRows);

      elements.sortableHeaders.forEach((header) => {
        header.addEventListener('click', () => {
          const key = header.dataset.sort;
          if (state.sortKey === key) {
            state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
          } else {
            state.sortKey = key;
            state.sortDirection = 'asc';
          }
          render();
        });
      });

      loadData();

      function loadData() {
        setLoading(true, 'Carregant dades...');

        google.script.run
          .withSuccessHandler((data) => {
            state.rows = data.rows || [];
            state.departments = data.departments || [];
            state.selectedRows.clear();
            fillDepartmentFilter();
            setLoading(false, '');
            updateButtonLabels();
            render();
          })
          .withFailureHandler((error) => {
            setLoading(false, '');
            showMessage(getErrorMessage(error), true);
          })
          .getProfessorsData();
      }

      function fillDepartmentFilter() {
        const currentValue = elements.deptFilter.value;
        elements.deptFilter.innerHTML = '<option value="">Tots</option>';

        state.departments.forEach((department) => {
          const option = document.createElement('option');
          option.value = department;
          option.textContent = department;
          elements.deptFilter.appendChild(option);
        });

        elements.deptFilter.value = state.departments.includes(currentValue)
          ? currentValue
          : '';
      }

      function render() {
        const department = elements.deptFilter.value;
        const search = normalize(elements.nameFilter.value);
        const showBaixa = elements.baixaFilter.checked;
        const showNoActius = elements.noActiusFilter.checked;

        let rows = state.rows.filter((row) => {
          if (department && row.dept !== department) return false;
          if (search && !normalize(row.fullName).includes(search)) return false;
          if (showBaixa !== row.baixa) return false;
          if (showNoActius !== row.noActiu) return false;
          return true;
        });

        if (state.sortKey) {
          rows = [...rows].sort((a, b) => compareRows(a, b, state.sortKey));
          if (state.sortDirection === 'desc') rows.reverse();
        }

        state.visibleRows = rows;
        syncSelectedRowsWithVisibleRows();
        drawTable(rows);
        updateSortHeaders();
        updateCount();
      }

      function drawTable(rows) {
        elements.tableBody.innerHTML = '';

        const fragment = document.createDocumentFragment();

        rows.forEach((row) => {
          const tr = document.createElement('tr');
          const checkboxCell = document.createElement('td');
          checkboxCell.className = 'select-col';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = state.selectedRows.has(row.rowNumber);
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
              state.selectedRows.add(row.rowNumber);
            } else {
              state.selectedRows.delete(row.rowNumber);
            }
            updateCount();
          });

          checkboxCell.appendChild(checkbox);
          tr.appendChild(checkboxCell);

          ['esp', 'dept', 'fullName', 'situacio', 'dni', 'telf', 'correu', 'xtec']
            .forEach((key) => {
              const td = document.createElement('td');
              if (key === 'fullName') {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'name-button';
                button.textContent = row[key] || '';
                button.addEventListener('click', () => openTeacherModal(row.rowNumber));
                td.appendChild(button);
              } else {
                td.textContent = row[key] || '';
              }
              tr.appendChild(td);
            });

          fragment.appendChild(tr);
        });

        elements.tableBody.appendChild(fragment);

        if (rows.length === 0) {
          showMessage('No hi ha files per mostrar.', false);
        } else {
          showMessage('', false);
        }
      }

      function updateSortHeaders() {
        elements.sortableHeaders.forEach((header) => {
          const label = header.textContent.replace(/\s+[AZ]-[ZA]$/, '');
          if (header.dataset.sort === state.sortKey) {
            header.textContent = `${label} ${state.sortDirection === 'asc' ? 'A-Z' : 'Z-A'}`;
          } else {
            header.textContent = label;
          }
        });
      }

      function updateCount() {
        elements.count.textContent =
          `${state.visibleRows.length} files | ${state.selectedRows.size} seleccionades`;
        updateSelectVisibleRowsState();
      }

      function updateButtonLabels() {
        elements.baixaButton.textContent = elements.baixaFilter.checked
          ? 'Donar de alta'
          : 'Donar de baixa';
        elements.actiuButton.textContent = elements.noActiusFilter.checked
          ? 'Activar'
          : 'Desactivar';
      }

      function resetFilters() {
        elements.deptFilter.value = '';
        elements.nameFilter.value = '';
        render();
      }

      function updateBaixa() {
        const value = !elements.baixaFilter.checked;
        runUpdate('updateBaixa', value, 'Actualitzant baixa...');
      }

      function updateActiu() {
        const value = elements.noActiusFilter.checked;
        runUpdate('updateActiu', value, 'Actualitzant estat...');
      }

      function runUpdate(functionName, value, loadingMessage) {
        const rowNumbers = [...state.selectedRows];

        if (rowNumbers.length === 0) {
          showMessage('Cal seleccionar almenys una fila.', true);
          return;
        }

        setLoading(true, loadingMessage);

        google.script.run
          .withSuccessHandler(() => {
            loadData();
          })
          .withFailureHandler((error) => {
            setLoading(false, '');
            showMessage(getErrorMessage(error), true);
          })[functionName](rowNumbers, value);
      }

      function toggleVisibleSelection() {
        const visibleRowNumbers = state.visibleRows.map((row) => row.rowNumber);
        if (elements.selectVisibleRows.checked) {
          visibleRowNumbers.forEach((rowNumber) => state.selectedRows.add(rowNumber));
        } else {
          visibleRowNumbers.forEach((rowNumber) => state.selectedRows.delete(rowNumber));
        }
        render();
      }

      function syncSelectedRowsWithVisibleRows() {
        const allRowNumbers = new Set(state.rows.map((row) => row.rowNumber));
        [...state.selectedRows].forEach((rowNumber) => {
          if (!allRowNumbers.has(rowNumber)) state.selectedRows.delete(rowNumber);
        });
      }

      function updateSelectVisibleRowsState() {
        const visibleRowNumbers = state.visibleRows.map((row) => row.rowNumber);
        const selectedVisibleRows = visibleRowNumbers.filter((rowNumber) =>
          state.selectedRows.has(rowNumber)
        );
        elements.selectVisibleRows.checked =
          visibleRowNumbers.length > 0 && selectedVisibleRows.length === visibleRowNumbers.length;
        elements.selectVisibleRows.indeterminate =
          selectedVisibleRows.length > 0 && selectedVisibleRows.length < visibleRowNumbers.length;
      }

      function openTeacherModal(rowNumber) {
        elements.teacherModalBackdrop.classList.add('open');
        elements.teacherModalTitle.textContent = 'Professor';
        elements.teacherModalBody.textContent = 'Carregant...';
        elements.teacherModalActions.innerHTML = '';

        google.script.run
          .withSuccessHandler((teacher) => {
            renderTeacherDetails(teacher);
          })
          .withFailureHandler((error) => {
            elements.teacherModalBody.textContent = getErrorMessage(error);
          })
          .getTeacherDetails(rowNumber);
      }

      function closeTeacherModal() {
        elements.teacherModalBackdrop.classList.remove('open');
        elements.teacherModalBody.innerHTML = '';
        elements.teacherModalActions.innerHTML = '';
      }

      function renderTeacherDetails(teacher) {
        elements.teacherModalTitle.textContent = teacher.title || 'Professor';
        elements.teacherModalBody.innerHTML = '';
        elements.teacherModalActions.innerHTML = '';

        const grid = document.createElement('div');
        grid.className = 'detail-grid';

        teacher.fields.forEach((field) => {
          const item = document.createElement('div');
          item.className = 'detail-item';
          const label = document.createElement('span');
          label.className = 'detail-label';
          label.textContent = field.label;
          const value = document.createElement('div');
          value.className = 'detail-value';
          value.textContent = field.type === 'boolean' ? (field.value ? 'TRUE' : 'FALSE') : field.value;
          item.append(label, value);
          grid.appendChild(item);
        });

        const editButton = document.createElement('button');
        editButton.type = 'button';
        editButton.className = 'primary';
        editButton.textContent = 'Edit';
        editButton.addEventListener('click', () => renderTeacherForm(teacher));

        elements.teacherModalBody.appendChild(grid);
        elements.teacherModalActions.appendChild(editButton);
      }

      function renderTeacherForm(teacher) {
        elements.teacherModalBody.innerHTML = '';
        elements.teacherModalActions.innerHTML = '';

        const form = document.createElement('form');
        form.className = 'form-grid';
        form.dataset.rowNumber = teacher.rowNumber;

        teacher.fields.forEach((field) => {
          const wrapper = document.createElement('label');
          wrapper.className = 'form-field';
          wrapper.textContent = field.label;

          const input = document.createElement('input');
          input.name = field.key;
          input.type = field.type === 'boolean' ? 'checkbox' : 'text';
          if (field.type === 'boolean') {
            input.checked = field.value === true;
          } else {
            input.value = field.value || '';
          }
          input.dataset.type = field.type;

          wrapper.appendChild(input);
          form.appendChild(wrapper);
        });

        const saveButton = document.createElement('button');
        saveButton.type = 'button';
        saveButton.className = 'primary';
        saveButton.textContent = 'Save';
        saveButton.addEventListener('click', () => saveTeacherForm(form));

        const cancelButton = document.createElement('button');
        cancelButton.type = 'button';
        cancelButton.textContent = 'Cancel';
        cancelButton.addEventListener('click', () => renderTeacherDetails(teacher));

        elements.teacherModalBody.appendChild(form);
        elements.teacherModalActions.append(cancelButton, saveButton);
      }

      function saveTeacherForm(form) {
        const fields = {};
        form.querySelectorAll('input').forEach((input) => {
          fields[input.name] = input.dataset.type === 'boolean' ? input.checked : input.value;
        });
        elements.teacherModalActions.querySelectorAll('button').forEach((button) => {
          button.disabled = true;
        });

        google.script.run
          .withSuccessHandler((teacher) => {
            renderTeacherDetails(teacher);
            loadData();
          })
          .withFailureHandler((error) => {
            elements.teacherModalBody.insertAdjacentText('afterbegin', getErrorMessage(error));
            elements.teacherModalActions.querySelectorAll('button').forEach((button) => {
              button.disabled = false;
            });
          })
          .saveTeacherDetails(Number(form.dataset.rowNumber), fields);
      }

      function openExportModal() {
        if (state.selectedRows.size === 0) {
          showMessage('Cal seleccionar almenys una fila.', true);
          return;
        }
        elements.exportResult.textContent = '';
        elements.exportResult.classList.remove('error');
        elements.exportModalBackdrop.classList.add('open');
      }

      function closeExportModal() {
        elements.exportModalBackdrop.classList.remove('open');
      }

      function exportSelectedRows() {
        const rowNumbers = [...state.selectedRows];
        elements.confirmExportButton.disabled = true;
        elements.exportResult.textContent = 'Exportant...';
        elements.exportResult.classList.remove('error');

        google.script.run
          .withSuccessHandler((result) => {
            elements.confirmExportButton.disabled = false;
            elements.exportResult.innerHTML = '';
            downloadTextFile(result);
            elements.exportResult.textContent = `Descarregat: ${result.fileName}`;
          })
          .withFailureHandler((error) => {
            elements.confirmExportButton.disabled = false;
            elements.exportResult.textContent = getErrorMessage(error);
            elements.exportResult.classList.add('error');
          })
          .exportTeachers(rowNumbers);
      }

      function downloadTextFile(file) {
        const blob = new Blob([file.content], {
          type: file.mimeType || 'text/csv;charset=utf-8',
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = file.fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function compareRows(a, b, key) {
        const resolvedKey = key === 'fullName' ? 'fullNameSort' : key;
        return String(a[resolvedKey] || '').localeCompare(String(b[resolvedKey] || ''), 'ca', {
          numeric: true,
          sensitivity: 'base',
        });
      }

      function normalize(value) {
        return String(value || '').trim().toLocaleLowerCase('ca');
      }

      function setLoading(isLoading, message) {
        state.loading = isLoading;
        [elements.baixaButton, elements.actiuButton, elements.resetButton].forEach((button) => {
          button.disabled = isLoading;
        });
        if (message) showMessage(message, false);
      }

      function showMessage(message, isError) {
        elements.message.textContent = message;
        elements.message.classList.toggle('error', Boolean(isError));
      }

      function getErrorMessage(error) {
        return error && error.message ? error.message : String(error || 'Error desconegut');
      }
    </script>
  </body>
</html>
